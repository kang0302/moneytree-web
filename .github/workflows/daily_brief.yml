name: Daily Brief Generator

on:
  workflow_dispatch: {}
  schedule:
    # KST 08:15 = UTC 23:15 (US 마감·Bloomberg Tech·Closing Bell 방영 완료 후, KR 개장 45분 전)
    # 00:00 UTC 정각 슬롯은 GitHub Actions 부하 폭주로 지연·스킵 빈번 — 23:15 로 회피.
    - cron: "15 23 * * *"

permissions:
  contents: write

concurrency:
  group: mt-daily-brief
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install runtime deps (no-save, CI only)
        run: |
          npm install --no-save \
            @anthropic-ai/sdk@^0.32.1 \
            cheerio@^1.0.0 \
            fast-xml-parser@^4.5.0 \
            youtube-transcript@^1.2.1

      - name: Generate daily brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node scripts/daily_brief.mjs

      - name: Rebuild daily-brief index.json
        shell: bash
        run: |
          node scripts/build_daily_brief_index.mjs

      - name: Compute brief metadata
        id: brief
        shell: bash
        run: |
          DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          BRIEF_PATH="public/data/daily_briefs/${DATE}.md"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "path=${BRIEF_PATH}" >> "$GITHUB_OUTPUT"
          if [ -f "$BRIEF_PATH" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit & push if new brief generated
        if: steps.brief.outputs.exists == 'true'
        shell: bash
        run: |
          set -e
          if [ -z "$(git status --porcelain public/data/daily_briefs/)" ]; then
            echo "No new brief to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git pull --rebase --autostash origin main

          # ✅ 다른 워크플로우와 동일한 conflict-marker guard
          if [ -n "$(git ls-files -u)" ]; then
            echo "❌ Unmerged paths after rebase:"
            git status --short
            exit 1
          fi
          if grep -rlE '^(<<<<<<< |=======$|>>>>>>> )' public/data/daily_briefs/ 2>/dev/null; then
            echo "❌ Conflict markers in brief output. Aborting."
            exit 1
          fi

          git add public/data/daily_briefs/
          DATE=${{ steps.brief.outputs.date }}
          git commit -m "chore(brief): daily ${DATE}"
          git push origin HEAD:main

      # ─────────────────────────────────────────────────────────────
      # MD → HTML 변환 (Gmail 테이블 렌더링용 인라인 CSS 포함).
      # ─────────────────────────────────────────────────────────────
      - name: Convert MD to HTML (inline CSS)
        if: steps.brief.outputs.exists == 'true'
        id: html
        shell: bash
        run: |
          set -e
          npm install --no-save marked@^14
          HTML_PATH="${{ steps.brief.outputs.path }}.html"
          node <<'EOF'
          const fs = require('fs');
          const { marked } = require('marked');
          marked.setOptions({ gfm: true, breaks: true });
          const mdPath = process.env.MD_PATH;
          const htmlPath = process.env.HTML_PATH;
          const md = fs.readFileSync(mdPath, 'utf-8');
          const body = marked.parse(md);
          const css = `<style>
            body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;font-size:14px;line-height:1.55;color:#1a1a1a;max-width:980px;margin:0 auto;padding:16px}
            h1{font-size:22px;border-bottom:2px solid #1a1a1a;padding-bottom:6px;margin-top:24px}
            h2{font-size:18px;margin-top:28px;border-left:4px solid #0a66c2;padding-left:8px}
            h3{font-size:15px;margin-top:18px;color:#0a66c2}
            table{border-collapse:collapse;width:100%;margin:10px 0;table-layout:auto}
            th,td{border:1px solid #d0d0d0;padding:8px 10px;text-align:left;vertical-align:top;font-size:13px}
            th{background:#f4f6f8;font-weight:600;color:#0a66c2}
            tr:nth-child(even) td{background:#fafbfc}
            a{color:#0a66c2;text-decoration:none}
            a:hover{text-decoration:underline}
            code{background:#f4f6f8;padding:1px 5px;border-radius:3px;font-size:12px}
            hr{border:none;border-top:1px solid #e0e0e0;margin:20px 0}
            blockquote{border-left:3px solid #ffb84d;background:#fff8e1;padding:8px 12px;margin:10px 0;font-size:13px;color:#5d4500}
          </style>`;
          const html = `<!DOCTYPE html><html><head><meta charset="utf-8">${css}</head><body>${body}</body></html>`;
          fs.writeFileSync(htmlPath, html, 'utf-8');
          console.log(`Wrote ${htmlPath} (${html.length} chars)`);
          EOF
          echo "html_path=${HTML_PATH}" >> "$GITHUB_OUTPUT"
        env:
          MD_PATH: ${{ steps.brief.outputs.path }}
          HTML_PATH: ${{ steps.brief.outputs.path }}.html

      # ─────────────────────────────────────────────────────────────
      # Email delivery — Gmail SMTP + App Password.
      # 본문은 HTML (테이블 인라인 CSS 적용). 성공(MD 파일 존재) 시에만 발송.
      # 필요 secret: GMAIL_USER (보낸이 = 받는이 주소), GMAIL_APP_PASSWORD (Google App Password).
      # ─────────────────────────────────────────────────────────────
      - name: Send brief via Gmail
        if: steps.brief.outputs.exists == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          from: Moneytree Daily Brief <${{ secrets.GMAIL_USER }}>
          to: ${{ secrets.GMAIL_USER }}
          subject: "[머니트리] 데일리 테마 매핑 — ${{ steps.brief.outputs.date }}"
          html_body: file://${{ steps.html.outputs.html_path }}
