name: Daily Brief Generator

on:
  workflow_dispatch: {}
  schedule:
    # KST 08:15 = UTC 23:15 (US 마감·Bloomberg Tech·Closing Bell 방영 완료 후, KR 개장 45분 전)
    # 00:00 UTC 정각 슬롯은 GitHub Actions 부하 폭주로 지연·스킵 빈번 — 23:15 로 회피.
    - cron: "15 23 * * *"

permissions:
  contents: write

concurrency:
  group: mt-daily-brief
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install runtime deps (no-save, CI only)
        run: |
          npm install --no-save \
            @anthropic-ai/sdk@^0.32.1 \
            cheerio@^1.0.0 \
            fast-xml-parser@^4.5.0 \
            youtube-transcript@^1.2.1

      - name: Generate daily brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node scripts/daily_brief.mjs

      - name: Compute brief metadata
        id: brief
        shell: bash
        run: |
          DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          BRIEF_PATH="public/data/daily_briefs/${DATE}.md"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "path=${BRIEF_PATH}" >> "$GITHUB_OUTPUT"
          if [ -f "$BRIEF_PATH" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit & push if new brief generated
        if: steps.brief.outputs.exists == 'true'
        shell: bash
        run: |
          set -e
          if [ -z "$(git status --porcelain public/data/daily_briefs/)" ]; then
            echo "No new brief to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git pull --rebase --autostash origin main

          # ✅ 다른 워크플로우와 동일한 conflict-marker guard
          if [ -n "$(git ls-files -u)" ]; then
            echo "❌ Unmerged paths after rebase:"
            git status --short
            exit 1
          fi
          if grep -rlE '^(<<<<<<< |=======$|>>>>>>> )' public/data/daily_briefs/ 2>/dev/null; then
            echo "❌ Conflict markers in brief output. Aborting."
            exit 1
          fi

          git add public/data/daily_briefs/
          DATE=${{ steps.brief.outputs.date }}
          git commit -m "chore(brief): daily ${DATE}"
          git push origin HEAD:main

      # ─────────────────────────────────────────────────────────────
      # Email delivery — Gmail SMTP + App Password.
      # 본문은 MD inline. 성공(MD 파일 존재) 시에만 발송.
      # 필요 secret: GMAIL_USER (보낸이 = 받는이 주소), GMAIL_APP_PASSWORD (Google App Password).
      # ─────────────────────────────────────────────────────────────
      - name: Send brief via Gmail
        if: steps.brief.outputs.exists == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          from: Moneytree Daily Brief <${{ secrets.GMAIL_USER }}>
          to: ${{ secrets.GMAIL_USER }}
          subject: "[머니트리] 데일리 테마 매핑 — ${{ steps.brief.outputs.date }}"
          body: file://${{ steps.brief.outputs.path }}
          convert_markdown: true
